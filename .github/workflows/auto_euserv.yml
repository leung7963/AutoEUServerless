name: Auto EUserv

on:
  #schedule:
   # - cron: '0 12 */3 * *'  # 每 3 天 UTC 时间 12:00 运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'  # 指定Python3.x

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
        git clone https://github.com/leung7963/ddddocr.git
        cd ddddocr
        pip install .

    - name: Run script
      env:
        EUSERV_USERNAME: ${{ secrets.EUSERV_USERNAME }}
        EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_USER_ID: ${{ secrets.TG_USER_ID }}
        MAILPARSER_DOWNLOAD_URL_ID: ${{ secrets.MAILPARSER_DOWNLOAD_URL_ID }}
      run: python Github_Action.py
    - name: 删除旧的运行记录
      uses: leung7963/delete-workflow-runs@main
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}  # 自动匹配当前工作流
          use_daily_retention: "true"
          keep_minimum_runs: 1
          retain_days: 1